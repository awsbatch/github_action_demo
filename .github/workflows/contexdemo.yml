name: Context demo
on: push
jobs:
  context-demo:
    runs-on: ubuntu-latest
    steps:
      - name: Use context variable
        run: |
           echo "this workflow is triger by ${{ github.actor }}
           echo "The repo name is ${{ github.repository }}

      - name: Print all variable under github
        run: echo ${{ toJson(github) }}

      - name: Print environment variables
        run: echo "$GITHUB_SHA"
