# run multiple jobs in single workflow
name: hello world
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Build Step
        run: |
          echo "Hello, ${{ vars.MY_NAME }}"
          echo "This is docker pass is ${{ secrets.DOCKER_PASSWORD }}"
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Test build
        run: echo "Running test cases"

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deploy the App
        run: echo "Deploying a App"
