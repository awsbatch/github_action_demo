# run multiple jobs in single workflow
name: hello world
on: 
  push:
    branches:
      - main
      - develop
      - 'release/**'
  pull_request:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Build Step
        run: echo "A demo build"
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Test build
        run: echo "Running test cases"

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deploy the App
        run: echo "Deploying a App"
